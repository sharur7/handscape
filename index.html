<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handscape · gesture playground</title>
  <meta name="description" content="Turn gestures into play. Play with 30+ mini-experiences using just your hands, right in your browser." />

  <!-- favicon / app icons -->
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/png" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <!-- social sharing (Open Graph + Twitter card) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Handscape · gesture playground" />
  <meta property="og:description" content="Turn gestures into play. Play with 30+ mini-experiences using just your hands, right in your browser." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Handscape · gesture playground" />
  <meta name="twitter:description" content="Turn gestures into play. Play with 30+ mini-experiences using just your hands, right in your browser." />
  <meta name="twitter:image" content="/og-image.png" />

  <link rel="stylesheet" href="./css/styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="mobile-notice">
    👋 Best on a <b>desktop/laptop</b> with a webcam — but feel free to look around here.
    <button class="mn-close" id="mn-close" aria-label="dismiss">✕</button>
  </div>
  <div id="app">
    <!-- Left: experiences column -->
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- loose line-art raised hand: four fingers + a thumb sweeping into the palm heel -->
            <g stroke="#ffd60a" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19"   y1="24" x2="18.5" y2="11"/>
              <line x1="24"   y1="24" x2="24"   y2="9"/>
              <line x1="29"   y1="24" x2="29.5" y2="11"/>
              <line x1="33.5" y1="25" x2="34.5" y2="14"/>
              <path d="M13 21 C 10.5 26, 11.5 32, 17 35 C 23 38, 29 36, 33 31"/>
            </g>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Handscape</h1>
          <p>interact &middot; play &middot; create</p>
        </div>
        <button id="menu-btn" aria-label="open games menu">☰</button>
      </div>
      <nav id="experience-list"><!-- filled by JS --></nav>
      <div class="sidebar-foot">
        <span id="cam-status" class="dot-status">camera: idle</span>
        <div class="credit">
          <span class="credit-by">Crafted by <b>Sharvari Raut</b></span>
          <div class="socials">
            <a href="https://x.com/aree_yarr_sharu" target="_blank" rel="noopener noreferrer" title="X (Twitter)" aria-label="Sharvari on X">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/></svg>
            </a>
            <a href="https://www.instagram.com/aree_yarr_sharoo/" target="_blank" rel="noopener noreferrer" title="Instagram" aria-label="Sharvari on Instagram">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none"/></svg>
            </a>
            <a href="https://www.linkedin.com/in/sharvari2706/" target="_blank" rel="noopener noreferrer" title="LinkedIn" aria-label="Sharvari on LinkedIn">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28ZM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14ZM7.12 20.45H3.56V9h3.56v11.45ZM22.22 0H1.77C.8 0 0 .78 0 1.73v20.54C0 23.23.8 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .78 23.2 0 22.22 0Z"/></svg>
            </a>
            <a href="mailto:sharuraut7official@gmail.com" title="Email" aria-label="Email Sharvari">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m3.5 6.5 8.5 6 8.5-6"/></svg>
            </a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Right: the stage (two screens) -->
    <main id="stage">
      <section id="scene-panel" class="panel">
        <div class="panel-head">
          <span class="panel-title" id="scene-title">Interactive Scene</span>
          <span class="panel-tag" id="scene-tag">—</span>
        </div>
        <div id="scene-mount" class="mount">
          <div id="scene-cursor" class="hand-cursor"></div>
        </div>
        <div id="scene-hint" class="overlay-hint"></div>
      </section>

      <section id="cam-panel" class="panel">
        <div class="panel-head">
          <span class="panel-title">Hand Tracking</span>
          <span class="panel-tag" id="hand-tag">no hands</span>
        </div>
        <div id="cam-mount" class="mount">
          <video id="cam-video" playsinline muted></video>
          <canvas id="cam-overlay"></canvas>
          <button id="enable-cam" class="enable-cam">▶ Enable camera</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
